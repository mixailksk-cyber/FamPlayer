name: Build Android APK (Expo)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'  # Меняем на 20 для совместимости
          
      - name: Install dependencies
        run: npm install
        
      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.FAMNOTES }}
          
      - name: Build APK locally
        run: eas build --platform android --profile preview --local --non-interactive --output=./app-release.apk
        env:
          EXPO_TOKEN: ${{ secrets.FAMNOTES }}
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: ./app-release.apk
          retention-days: 30
