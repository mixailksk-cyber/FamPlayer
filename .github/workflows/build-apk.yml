name: Build Android APK (Expo)

on:
  workflow_dispatch:  # Только ручной запуск
    inputs:
      version:
        description: 'Версия сборки'
        required: false
        default: 'latest'
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Clear npm cache
        run: npm cache clean --force
          
      - name: Install dependencies
        run: |
          rm -rf node_modules
          npm install --legacy-peer-deps
          npx expo install --fix
          
      - name: Clear Metro cache
        run: npx expo start --clear
          
      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          
      - name: Clear Android build cache
        run: |
          if [ -d "android" ]; then
            cd android
            chmod +x gradlew
            ./gradlew clean
            cd ..
            rm -rf android/app/build
          fi
          
      - name: Prebuild project
        run: npx expo prebuild --platform android --clean
          
      - name: Build APK locally
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon --refresh-dependencies
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk-${{ github.run_number }}
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
