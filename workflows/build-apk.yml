name: Сборка APK

# Когда запускать сборку
on:
  push:
    branches:
      - main        # при пуше в main
      - master      # или master (если у вас такая ветка)
  workflow_dispatch: # возможность запуска вручную

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      # Шаг 1: Копируем код из репозитория
      - name: 📥 Получение кода
        uses: actions/checkout@v4
      
      # Шаг 2: Устанавливаем Node.js
      - name: ⚙️ Установка Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'
      
      # Шаг 3: Устанавливаем Java (нужен для Android)
      - name: ☕ Установка JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      # Шаг 4: Устанавливаем Android SDK
      - name: 📱 Установка Android SDK
        uses: android-actions/setup-android@v3
      
      # Шаг 5: Устанавливаем Expo CLI и EAS
      - name: 🚀 Установка Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      
      # Шаг 6: Устанавливаем зависимости проекта
      - name: 📦 Установка зависимостей
        run: |
          npm ci
      
      # Шаг 7: Сборка APK
      - name: 🔨 Сборка Android APK
        run: |
          npx expo prebuild --clean
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease
      
      # Шаг 8: Сохраняем APK как артефакт
      - name: 💾 Сохранение APK
        uses: actions/upload-artifact@v4
        with:
          name: FamNote-APK
          path: android/app/build/outputs/apk/release/app-release.apk